{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de Processos</title>
</head>
<body>

    {% if user.is_authenticated %}
    <div style="text-align: right; padding: 10px; background-color: #f0f0f0; border-bottom: 1px solid #ccc; margin-bottom: 20px;">
        <span>Bem-vindo(a), <strong>{{ user.username }}</strong>!</span>
        <form action="{% url 'logout' %}" method="post" style="display: inline; margin-left: 15px;">
            {% csrf_token %}
            <button type="submit" style="padding: 5px 10px; cursor: pointer; background-color: #dc3545; color: white; border: none; border-radius: 3px;">Sair</button>
        </form>
    </div>
    {% endif %}

    {% block content %}{% endblock %}

    {% block scripts %}{% endblock %}
    
</body>
</html>

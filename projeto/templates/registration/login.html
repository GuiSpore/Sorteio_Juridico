{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px; background-color: #f9f9f9;">
    <h2 style="text-align: center;">Login no Sistema</h2>
    
    {% if form.errors %}
        <p style="color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 3px; text-align: center;">
            Usuário ou senha inválidos. Tente novamente.
        </p>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div style="margin-bottom: 15px;">
            <label for="id_username"><strong>Usuário:</strong></label><br>
            {{ form.username }}
        </div>
        <div style="margin-bottom: 20px;">
            <label for="id_password"><strong>Senha:</strong></label><br>
            {{ form.password }}
        </div>
        <button type="submit" style="width: 100%; padding: 10px; cursor: pointer; font-size: 16px;">Entrar</button>
    </form>
</div>
{% endblock %}
